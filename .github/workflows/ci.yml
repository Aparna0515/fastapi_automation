name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Backend Test Suite
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: fast_automation
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Wait for MySQL to be ready
        run: |
          until nc -z -v -w30 127.0.0.1 3306; do
            echo "Waiting for MySQL database connection..."
            sleep 1
          done

      - name: Run Alembic Migrations
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: fast_automation
          MYSQL_USER: root
          MYSQL_PASSWORD: ""
          SECRET_KEY: test_secret_key
        run: |
          cd automation
          alembic upgrade head

      - name: Run Integration Tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: fast_automation
          MYSQL_USER: root
          MYSQL_PASSWORD: ""
          SECRET_KEY: test_secret_key
        run: |
          cd automation
          python tests/test_upload.py

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create deployment directory if not exists, and enter it
            mkdir -p ~/app && cd ~/app
            
            # If the repository is not cloned yet, clone it. Otherwise, pull latest.
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin
              git reset --hard origin/${{ github.ref_name }}
            fi

            # Rebuild and start the containers in background
            docker compose down
            docker compose up --build -d
