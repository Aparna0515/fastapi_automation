version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fast_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: fast_automation
      MYSQL_USER: auto_user
      MYSQL_PASSWORD: auto_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uauto_user", "-pauto_password"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --key-buffer-size=16M --table-open-cache=64 --sort-buffer-size=512K --read-buffer-size=256K --read-rnd-buffer-size=512K --join-buffer-size=256K --thread-cache-size=8 --max-connections=20 --innodb-buffer-pool-size=64M --innodb-log-buffer-size=8M


  redis:
    image: redis:7.0-alpine
    container_name: fast_redis_broker
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast_web_app
    restart: always
    environment:
      - APP_NAME=FastAPI Auth
      - DEBUG=True
      - SECRET_KEY=change_this_secret_key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=fast_automation
      - MYSQL_USER=auto_user
      - MYSQL_PASSWORD=auto_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@secureportal.com}
      - SMTP_TLS=${SMTP_TLS:-False}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast_celery_worker
    restart: always
    environment:
      - APP_NAME=FastAPI Auth
      - DEBUG=True
      - SECRET_KEY=change_this_secret_key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=fast_automation
      - MYSQL_USER=auto_user
      - MYSQL_PASSWORD=auto_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@secureportal.com}
      - SMTP_TLS=${SMTP_TLS:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.core.celery.celery_app worker --loglevel=info --concurrency=1

  nginx:
    image: nginx:alpine
    container_name: fast_nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  mysql_data:
